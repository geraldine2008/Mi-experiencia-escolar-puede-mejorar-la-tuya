<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4efff;
}

/* NAVBAR */
.navbar{
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(90deg,#5a189a,#7b2cbf,#9d4edd);
padding:15px;
position:relative;
}

/* MENÚ PRINCIPAL */
.menu{
display:flex;
gap:35px;
list-style:none;
margin:0;
padding:0;
}

.menu li{
position:relative;
}

.menu a{
color:white;
text-decoration:none;
font-size:16px;
padding:8px;
display:block;
}

/* SUBMENÚ */
.submenu{
display:none;
position:absolute;
top:35px;
left:0;
background:white;
min-width:120px;
border-radius:8px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.submenu a{
color:#333;
padding:10px;
}

.menu li:hover .submenu{
display:block;
}

/* HAMBURGUESA */
.hamburguesa{
display:none;
position:absolute;
left:15px;
font-size:26px;
color:white;
cursor:pointer;
}

/* HERO */
.hero{
height:350px;
background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
}

/* CELULAR */
@media(max-width:768px){

.menu{
display:none;
flex-direction:column;
background:#7b2cbf;
position:absolute;
top:60px;
left:0;
width:100%;
padding:20px;
}

.menu.activo{
display:flex;
}

.submenu{
position:static;
background:#9d4edd;
box-shadow:none;
}

.submenu a{
color:white;
}

.hamburguesa{
display:block;
}

}

</style>

</head>
