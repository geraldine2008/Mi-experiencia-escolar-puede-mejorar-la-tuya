<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi experiencia escolar</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">

  <div class="hamburguesa" onclick="toggleMenu()">☰</div>

  <img src="pce2.jpg" class="img-menu" alt="Imagen decorativa">

  <ul class="menu" id="menu">

    <li>
      <a href="por.html">¿Por qué ocurre el abandono escolar?</a>
      <div class="submenu">
        <a href="#">#1.1</a>

      </div>
    </li>

    <li>
      <a href="#">#2</a>

        <a href="#">#2.1</a>

    </li>

    <li>
      <a href="#">#3</a>

        <a href="#">#3.1</a>

        <a href="#">#3.3</a>
      </div>
    </li>

  </ul>
</div>

<div class="hero"></div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("activo");
}

/* Submenú con clic en celular */
document.querySelectorAll(".menu li > a").forEach(link => {
  link.addEventListener("click", function(e){
    if(window.innerWidth <= 768){
      e.preventDefault();
      this.nextElementSibling.classList.toggle("mostrar");
    }
  });
});
</script>

</body>
</html>
